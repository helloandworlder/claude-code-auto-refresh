version: '3.8'

services:
  claude-agent:
    image: sczheng189/claude-auto-refresh:latest
    # 如果需要本地构建，取消下一行注释并注释上一行
    # build: .
    container_name: claude-auto-refresh
    restart: unless-stopped
    environment:
      # Timezone
      - TZ=Asia/Shanghai
      # Unified configuration
      - CLAUDE_ENDPOINT=${CLAUDE_ENDPOINT}
      - CLAUDE_API_KEYS=${CLAUDE_API_KEYS}
      # Schedule configuration
      - SCHEDULE_MODE=${SCHEDULE_MODE:-hourly}
      - SCHEDULE_START_TIME=${SCHEDULE_START_TIME}
      - SCHEDULE_END_TIME=${SCHEDULE_END_TIME}
      - SCHEDULE_INTERVAL=${SCHEDULE_INTERVAL}
      - SCHEDULE_WEEKDAYS=${SCHEDULE_WEEKDAYS}
      # Legacy group configuration (fallback)
      - CLAUDE_GROUP_1_ENDPOINT=${CLAUDE_GROUP_1_ENDPOINT}
      - CLAUDE_GROUP_1_API_KEY=${CLAUDE_GROUP_1_API_KEY}
      # Log level
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"